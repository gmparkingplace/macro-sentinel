name: Macro Sentinel Daily Report

on:
  # 매일 미국 동부 시간 오후 6시 (UTC 23:00) 자동 실행
  schedule:
    - cron: '0 23 * * 1-5'   # 월~금만 실행 (주말 제외)

  # 수동 실행 버튼 (테스트용)
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      # 1. 저장소 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python 세팅
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 패키지 설치
      - name: Install dependencies
        run: |
          pip install yfinance requests groq

      # 4. 데이터 수집 실행
      - name: Fetch market data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_data.py

      # 5. 리포트 생성 실행
      - name: Generate report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_report.py

      # 6. 결과 파일을 저장소에 커밋 & 푸시
      - name: Commit and push report
        run: |
          git config --global user.name "macro-sentinel-bot"
          git config --global user.email "bot@macro-sentinel"
          git add data/
          git diff --staged --quiet || git commit -m "📊 Daily report: $(date +'%Y-%m-%d')"
          git push
