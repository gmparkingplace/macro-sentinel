name: Macro Sentinel Daily Report

on:
  schedule:
    - cron: '0 23 * * 1-5'
  workflow_dispatch:

concurrency:
  group: daily-report
  cancel-in-progress: true

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests groq

      - name: Fetch market data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Generate report
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/generate_report.py

      - name: Commit and push report
        run: |
          git config --global user.name "macro-sentinel-bot"
          git config --global user.email "bot@macro-sentinel"
          git fetch origin main
          git add data/market_data.json data/report.json
          git commit -m "📊 Daily report: $(date +'%Y-%m-%d %H:%M')" --allow-empty
          git push origin HEAD:main
      - name: Trigger Vercel redeploy
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          curl -X POST "$VERCEL_DEPLOY_HOOK"
